name: Tests and Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write 
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Run Vitest with coverage
        run: deno task test:coverage

      - name: Generate badge JSON
        run: |
          jq -n --slurpfile cov coverage/coverage-summary.json \
            '{schemaVersion:1,label:"coverage",message:($cov[0].total.statements.pct|tostring + "%"),color:"blue"}' \
            > coverage-badge.json

      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.json


          
