name: Deploy to server and GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: 'main'

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Build site
        run: |
          deno task build

      - name: Try to download latest coverage badge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching latest coverage-badge artifact..."
          gh run list --limit 1 --workflow "Tests and Coverage" --json databaseId -q '.[0].databaseId' > run_id.txt || true
          RUN_ID=$(cat run_id.txt || echo "")
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name coverage-badge --dir build || echo "No artifact found."
          else
            echo "No test run found, skipping badge."
          fi
          [ -f build/coverage-badge.json ] && mv build/coverage-badge.json build/coverage-badge.json || true

      - name: Upload Pages Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - name: Download
        id: download
        uses: actions/download-artifact@v4
        with:
            name: build
      - name: Setup SSH key
        env:
            SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
            ssh-agent -a "${{ env.SSH_AUTH_SOCK }}" > /dev/null
            ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"
      - name: Deploy to server
        id: deploy-server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          remote_path: ${{ secrets.DEPLOY_REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4.0.5