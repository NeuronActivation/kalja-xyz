name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: 'main'

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Build site
        run: |
          deno task build

      - name: Try to download latest coverage badge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching latest coverage-badge artifact..."
          gh run list --limit 1 --workflow "Tests and Coverage" --json databaseId -q '.[0].databaseId' > run_id.txt || true
          RUN_ID=$(cat run_id.txt || echo "")
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name coverage-badge --dir build || echo "No artifact found."
          else
            echo "No test run found, skipping badge."
          fi
          [ -f build/coverage-badge.json ] && mv build/coverage-badge.json build/coverage-badge.json || true

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - name: Download
        id: download
        uses: actions/download-artifact@v4
        with:
            name: build
      - name: Setup SSH key
        env:
            SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
            ssh-agent -a "${{ env.SSH_AUTH_SOCK }}" > /dev/null
            ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"
      - name: Deploy to server
        id: deploy-server
        env:
            SSH_AUTH_SOCK: /tmp/ssh_agent.sock
            REMOTE_TARGET: "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
        run: |
            rsync -ahvz --delete \
              -e 'ssh -o StrictHostKeyChecking=no' \
              ./ "${{ env.REMOTE_TARGET }}:/home/${{ secrets.SSH_USER }}/public_html"
      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4.0.5